<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WOMB | NOCTEX TOKYO #01</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #060608;
  --card: #0e0e12;
  --border: #1c1c24;
  --gold: #c8a84a;
  --white: #ede9e0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--black); color: var(--white); font-family: 'Noto Sans JP', sans-serif; max-width: 430px; margin: 0 auto; }

/* ヒーロー画像：WOMBの象徴的なメインフロア */
.hero { 
  height: 450px; 
  background: url('https://www.womb.co.jp/wp-content/uploads/2015/03/f-main.jpg') center/cover no-repeat;
  position: relative;
  border-bottom: 1px solid var(--border);
}
.hero::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 20%, rgba(6,6,8,0.8) 70%, var(--black) 100%);
}

.back-btn {
  position: absolute; top: 25px; left: 20px; z-index: 100;
  width: 44px; height: 44px; background: rgba(0,0,0,0.6);
  border: 1px solid var(--border); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--white); text-decoration: none; font-size: 20px; backdrop-filter: blur(5px);
}

.content { padding: 0 25px 60px; margin-top: -60px; position: relative; z-index: 10; }
.label { font-family: 'DM Mono'; color: var(--gold); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.title { font-family: 'Bebas Neue'; font-size: 64px; line-height: 0.9; letter-spacing: 2px; margin-bottom: 25px; }

/* 5軸スコア（ビジュアル重視） */
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; }
.score-card { background: var(--card); border: 1px solid var(--border); padding: 18px; text-align: center; }
.s-label { font-family: 'DM Mono'; font-size: 10px; color: var(--gold); opacity: 0.7; margin-bottom: 5px; }
.s-val { font-family: 'Bebas Neue'; font-size: 36px; color: var(--white); }

/* セクションタイトル */
.section-head { font-family: 'Bebas Neue'; font-size: 24px; color: var(--gold); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; letter-spacing: 1px; }

/* ギャラリー（横スクロール） */
.gallery-wrap { margin: 0 -25px 40px; overflow-x: auto; display: flex; gap: 10px; padding: 0 25px; scroll-snap-type: x mandatory; }
.gallery-wrap::-webkit-scrollbar { display: none; }
.photo-card { 
  flex: 0 0 300px; height: 200px; border: 1px solid var(--border); 
  background-size: cover; background-position: center; scroll-snap-align: start;
}

.memo-text { font-size: 14px; line-height: 1.9; color: var(--white); opacity: 0.8; margin-bottom: 40px; }

.cta-group { display: flex; flex-direction: column; gap: 12px; }
.btn { display: block; padding: 20px; text-align: center; font-family: 'DM Mono'; font-weight: bold; text-decoration: none; font-size: 14px; letter-spacing: 1px; }
.btn-save { border: 1px solid var(--gold); color: var(--gold); }
.btn-map { background: var(--gold); color: var(--black); }

</style>
</head>
<body>

<div class="hero">
  <a href="index.html" class="back-btn">←</a>
</div>

<div class="content">
  <div class="label">RANKING #01 / TOKYO</div>
  <h1 class="title">WOMB</h1>

  <div class="score-grid">
    <div class="score-card"><div class="s-label">SOUND</div><div class="s-val">98</div></div>
    <div class="score-card"><div class="s-label">CROWD</div><div class="s-val">85</div></div>
    <div class="score-card"><div class="s-label">VIBE</div><div class="s-val">95</div></div>
    <div class="score-card"><div class="s-label">SERVICE</div><div class="s-val">75</div></div>
    <div class="score-card" style="grid-column: span 2;"><div class="s-label">LOCATION</div><div class="s-val">70</div></div>
  </div>

  <div class="section-head">VISUAL ARCHIVE</div>
  <div class="gallery-wrap">
    <div class="photo-card" style="background-image: url('https://www.womb.co.jp/wp-content/uploads/2015/03/f-main.jpg')"></div>
    <div class="photo-card" style="background-image: url('https://www.womb.co.jp/wp-content/uploads/2015/03/f-1f.jpg')"></div>
    <div class="photo-card" style="background-image: url('https://www.womb.co.jp/wp-content/uploads/2015/03/f-4f.jpg')"></div>
  </div>

  <div class="section-head">INSIDER NOTES</div>
  <p class="memo-text">
    渋谷道玄坂の奥に位置する、東京を代表する大型ベニュー。世界最高峰のサウンドシステム「Pioneer Pro Audio」を導入しており、2階メインフロアの没入感は圧倒的。1階のラウンジは赤を基調とした別のコンセプトで、一晩で二つの顔を楽しめるのが魅力。
  </p>

  <div class="cta-group">
    <a href="#" class="btn btn-save" onclick="this.innerText='SAVED ✓'">SAVE TO MY PAGE</a>
    <a href="https://maps.app.goo.gl/95N6BAtVp7YpWJ879" target="_blank" class="btn btn-map">GOOGLE MAPS</a>
  </div>
</div>

</body>
</html>
