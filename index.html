<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOCTEX | TOKYO MAP & LIST</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { 
  --black: #060608; 
  --border: #1c1c24; 
  --gold: #c8a84a; 
  --white: #ede9e0; 
  --card: #0e0e12; 
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  background: var(--black); 
  color: var(--white); 
  font-family: sans-serif; 
  max-width: 430px; 
  margin: 0 auto; 
  overflow: hidden; 
  height: 100vh; 
  display: flex; 
  flex-direction: column; 
}

/* --- ヘッダー --- */
.header { 
  padding: 20px; 
  border-bottom: 1px solid var(--border); 
  background: var(--black); 
  z-index: 100; 
}
.top-row { display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Bebas Neue'; font-size: 26px; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
.my-link { 
  font-family: 'DM Mono'; 
  font-size: 10px; 
  color: var(--gold); 
  text-decoration: none; 
  border: 1px solid var(--gold); 
  padding: 5px 12px;
  text-transform: uppercase;
}

/* --- 地図エリア（上半分） --- */
.map-container {
  flex: 0 0 45%; 
  width: 100%;
  position: relative;
  background: #111;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}

/* 地図をダークモード化しつつ、ピンの赤色を残す設定 */
.map-container iframe {
  width: 100%;
  height: 100%;
  border: 0;
  filter: grayscale(0.6) invert(0.9) contrast(1.2) brightness(0.8);
}

/* --- リストエリア（下半分） --- */
.list-section {
  flex: 1;
  overflow-y: auto;
  background: var(--black);
  -webkit-overflow-scrolling: touch;
}

.search-container { 
  padding: 15px 20px; 
  position: sticky; 
  top: 0; 
  background: var(--black); 
  z-index: 50; 
}
.search-input { 
  width: 100%; 
  background: var(--card); 
  border: 1px solid var(--border); 
  padding: 14px; 
  color: var(--white); 
  font-family: 'DM Mono'; 
  font-size: 13px; 
  outline: none; 
}

/* ランキングアイテム */
.rank-item { 
  display: flex; 
  align-items: center; 
  padding: 22px 20px; 
  border-bottom: 1px solid var(--border); 
  text-decoration: none; 
  color: inherit; 
}
.rank-item:active { background: #111; }

.rank-num { font-family: 'Bebas Neue'; font-size: 26px; color: var(--gold); width: 45px; }
.venue-info { flex: 1; }
.rank-name { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 1px; margin-bottom: 2px; }
.rank-meta { font-family: 'DM Mono'; font-size: 9px; color: #555; letter-spacing: 1px; }
.rank-score { font-family: 'Bebas Neue'; font-size: 22px; color: var(--white); opacity: 0.9; }

</style>
</head>
<body>

<div class="header">
  <div class="top-row">
    <a href="index.html" class="logo">NOCTEX</a>
    <a href="mypage.html" class="my-link">MY PAGE</a>
  </div>
</div>

<div class="map-container">
  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3241.670692751336!2d139.69294241525835!3d35.6592237801994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188b51a5d46291%3A0x629126d4a51e5e01!2sWOMB!5e0!3m2!1sja!2sjp!4v1620000000000!5m2!1sja!2sjp" 
    allowfullscreen="" loading="lazy">
  </iframe>
</div>

<div class="list-section">
  <div class="search-container">
    <input type="text" class="search-input" id="venueSearch" placeholder="SEARCH VENUE OR GENRE...">
  </div>

  <div id="ranking-list">
    <a href="womb.html" class="rank-item" data-name="WOMB" data-genre="TECHNO">
      <div class="rank-num">01</div>
      <div class="venue-info">
        <div class="rank-name">WOMB</div>
        <div class="rank-meta">SHIBUYA / TECHNO</div>
      </div>
      <div class="rank-score">92</div>
    </a>

    <div class="rank-item" data-name="ZEROTOKYO" data-genre="ALL GENRE">
      <div class="rank-num">02</div>
      <div class="venue-info">
        <div class="rank-name">ZEROTOKYO</div>
        <div class="rank-meta">SHINJUKU / ALL GENRE</div>
      </div>
      <div class="rank-score">89</div>
    </div>

    <div class="rank-item" data-name="VENT" data-genre="HOUSE">
      <div class="rank-num">03</div>
      <div class="venue-info">
        <div class="rank-name">VENT</div>
        <div class="rank-meta">OMOTESANDO / HOUSE</div>
      </div>
      <div class="rank-score">87</div>
    </div>
  </div>
</div>

<script>
  // 検索エンジンの実装
  document.getElementById('venueSearch').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.rank-item');
    items.forEach(item => {
      const name = item.getAttribute('data-name').toLowerCase();
      const genre = item.getAttribute('data-genre').toLowerCase();
      if (name.includes(term) || genre.includes(term)) {
        item.style.display = 'flex';
      } else {
        item.style.display = 'none';
      }
    });
  });
</script>

</body>
</html>
