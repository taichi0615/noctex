<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOCTEX | TOKYO 99</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #060608;
  --deep: #0a0a0e;
  --card: #0e0e12;
  --border: #1c1c24;
  --gold: #c8a84a;
  --white: #ede9e0;
  --muted: #52525e;
  --muted2: #84849a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--black); color: var(--white); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; max-width: 430px; margin: 0 auto; }

/* ── UI 共通 ── */
.top-nav { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; z-index:1000; background:rgba(6,6,8,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding: 15px 20px; display:flex; justify-content:space-between; align-items:center; }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:4px; color:var(--gold); text-decoration:none; }

.main { padding-top: 70px; padding-bottom: 100px; }

/* ── 都市ヘッダー ── */
.city-hero { padding: 30px 20px; border-bottom: 1px solid var(--border); }
.city-label { font-family:'DM Mono'; font-size:12px; color:var(--gold); letter-spacing:3px; }
.city-name { font-family:'Bebas Neue'; font-size:48px; line-height:1; margin: 5px 0; }
.city-stats { font-size:11px; color:var(--muted2); display:flex; gap:15px; }

/* ── 99 RANKING LIST ── */
.ranking-container { padding: 10px 0; }
.rank-item { display:flex; align-items:center; padding:15px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition: 0.2s; }
.rank-item:active { background: var(--card); }
.rank-num { font-family:'Bebas Neue'; font-size:28px; color:var(--muted); width:40px; }
.rank-item:nth-child(-n+3) .rank-num { color: var(--gold); }
.rank-info { flex:1; }
.rank-name { font-family:'Bebas Neue'; font-size:20px; letter-spacing:1px; }
.rank-tag { font-size:10px; color:var(--muted2); margin-top:2px; display:flex; gap:8px; }
.rank-score-mini { text-align:right; font-family:'Bebas Neue'; font-size:24px; }

/* ── 個店詳細モーダル（Slide-up） ── */
#venue-modal {
  position: fixed; inset: 0; background: var(--black); z-index: 2000;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
}
#venue-modal.open { transform: translateY(0); }
.modal-close { position: sticky; top: 20px; left: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2100; cursor: pointer; }

.venue-header { height: 250px; background-size: cover; background-position: center; position: relative; }
.venue-header::after { content:''; position:absolute; inset:0; background: linear-gradient(to bottom, transparent, var(--black)); }
.venue-body { padding: 20px; }

/* 5軸評価グラフ風 */
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
.score-item { background: var(--card); padding: 15px; border: 1px solid var(--border); border-radius: 4px; }
.score-label { font-size: 10px; color: var(--muted2); font-family: 'DM Mono'; text-transform: uppercase; }
.score-val { font-family: 'Bebas Neue'; font-size: 24px; color: var(--gold); }

.venue-desc { font-size: 13px; line-height: 1.8; color: var(--muted2); margin-bottom: 30px; }
.cta-btn { display: block; width: 100%; background: var(--gold); color: #000; text-align: center; padding: 15px; font-family: 'DM Mono'; font-weight: bold; text-decoration: none; border-radius: 4px; }

</style>
</head>
<body>

<nav class="top-nav">
  <a href="#" class="nav-logo">NOCTEX</a>
  <div style="color:var(--muted2)">TOKYO / JP</div>
</nav>

<main class="main">
  <section class="city-hero">
    <div class="city-label">THE 99 LIST</div>
    <h1 class="city-name">TOKYO</h1>
    <div class="city-stats">
      <span>99 VENUES</span>
      <span>UPDATED: 2026.03.11</span>
    </div>
  </section>

  <div class="ranking-container" id="ranking-list">
    </div>
</main>

<div id="venue-modal">
  <div class="modal-close" onclick="closeModal()">✕</div>
  <div id="modal-content">
    </div>
</div>

<script>
// 1. 東京 99件のデータ（サンプル）
const tokyoData = [
  { rank: "01", name: "WOMB", area: "SHIBUYA", genre: "TECHNO", score: 92, desc: "世界基準の音響システムと、アジア最大級のミラーボールを擁する東京テクノシーンの象徴。3フロア構成で、メインフロアの圧倒的な没入感は唯一無二。", scores: { sound: 98, crowd: 85, price: 70, vibe: 95, visual: 90 } },
  { rank: "02", name: "ZEROTOKYO", area: "SHINJUKU", genre: "ALL GENRE", score: 89, desc: "新宿歌舞伎町タワー内に誕生した巨大エンターテインメント空間。最新の照明技術と圧倒的なキャパシティで、国内外のトップアーティストを招聘。", scores: { sound: 90, crowd: 92, price: 65, vibe: 88, visual: 98 } },
  { rank: "03", name: "VENT", area: "OMOTESANDO", genre: "HOUSE / TECHNO", score: 87, desc: "「音」を追求する大人のための隠れ家。BOSEのカスタムスピーカーから放たれる純粋な音響体験は、耳の肥えたオーディエンスを魅了し続ける。", scores: { sound: 99, crowd: 80, price: 75, vibe: 92, visual: 60 } },
  // ... 本来はここで99位まで続く
];

// 4位〜99位のダミー生成
for(let i=4; i<=99; i++){
  tokyoData.push({
    rank: i.toString().padStart(2, '0'),
    name: `VENUE NAME ${i}`,
    area: i % 2 === 0 ? "ROPPONGI" : "SHIBUYA",
    genre: "HOUSE",
    score: 85 - Math.floor(i/3),
    desc: "詳細情報は現在準備中です。プレミアム会員限定で先行公開されます。",
    scores: { sound: 70, crowd: 70, price: 70, vibe: 70, visual: 70 }
  });
}

// 2. リストの表示
const listContainer = document.getElementById('ranking-list');
tokyoData.forEach(item => {
  const div = document.createElement('div');
  div.className = 'rank-item';
  div.innerHTML = `
    <div class="rank-num">${item.rank}</div>
    <div class="rank-info">
      <div class="rank-name">${item.name}</div>
      <div class="rank-tag"><span>${item.area}</span><span>${item.genre}</span></div>
    </div>
    <div class="rank-score-mini">${item.score}</div>
  `;
  div.onclick = () => openModal(item);
  listContainer.appendChild(div);
});

// 3. モーダル操作
function openModal(item) {
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="venue-header" style="background-image: url('https://images.unsplash.com/photo-1574391884720-bbc37bb0513c?auto=format&fit=crop&q=80&w=800')"></div>
    <div class="venue-body">
      <div class="city-label">${item.area} / ${item.genre}</div>
      <h2 class="city-name">${item.name}</h2>
      
      <div class="score-grid">
        <div class="score-item"><div class="score-label">Sound</div><div class="score-val">${item.scores.sound}</div></div>
        <div class="score-item"><div class="score-label">Crowd</div><div class="score-val">${item.scores.crowd}</div></div>
        <div class="score-item"><div class="score-label">Price</div><div class="score-val">${item.scores.price}</div></div>
        <div class="score-item"><div class="score-label">Visual</div><div class="score-val">${item.scores.visual}</div></div>
      </div>

      <p class="venue-desc">${item.desc}</p>
      
      <a href="#" class="cta-btn">ACCESS ON GOOGLE MAPS</a>
    </div>
  `;
  document.getElementById('venue-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('venue-modal').classList.remove('open');
}
</script>

</body>
</html>
