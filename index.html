<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTEX | TOKYO 99</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --black: #060608; --border: #1c1c24; --gold: #c8a84a; --white: #ede9e0; --card: #0e0e12; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: sans-serif; max-width: 430px; margin: 0 auto; border: 1px solid var(--border); min-height: 100vh; }

/* ヘッダー：確実にボタンが見えるように設計 */
.header { padding: 40px 20px 20px; background: var(--black); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
.logo { font-family: 'Bebas Neue'; font-size: 32px; color: var(--gold); letter-spacing: 2px; }

/* ！！！ここがマイページボタンです！！！ */
.my-link { 
  font-family: 'DM Mono'; 
  font-size: 11px; 
  color: var(--black); 
  background: var(--gold); /* 背景を金色にして目立たせました */
  text-decoration: none; 
  padding: 8px 14px;
  font-weight: bold;
  border-radius: 2px;
  text-transform: uppercase;
}

.search-input { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 15px; color: var(--white); font-family: 'DM Mono'; outline: none; }

/* リスト */
.rank-item { display: flex; align-items: center; padding: 25px 20px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; }
.rank-num { font-family: 'Bebas Neue'; font-size: 24px; color: #444; width: 45px; }
.rank-name { font-family: 'Bebas Neue'; font-size: 22px; flex: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="top-row">
    <div class="logo">NOCTEX</div>
    <a href="mypage.html" class="my-link">MY PAGE</a>
  </div>
  <div class="search-container">
    <input type="text" class="search-input" placeholder="SEARCH...">
  </div>
</div>

<div id="ranking-list">
  <a href="womb.html" class="rank-item">
    <div class="rank-num">01</div>
    <div class="rank-name">WOMB</div>
    <div style="color:var(--gold)">→</div>
  </a>
</div>

</body>
</html>
