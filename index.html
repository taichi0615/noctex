<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOCTEX | TOKYO MAP & LIST</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --black: #060608; --border: #1c1c24; --gold: #c8a84a; --white: #ede9e0; --card: #0e0e12; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: sans-serif; max-width: 430px; margin: 0 auto; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

/* ヘッダー */
.header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--black); z-index: 100; }
.top-row { display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Bebas Neue'; font-size: 24px; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
.my-link { font-family: 'DM Mono'; font-size: 10px; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 4px 10px; }

/* 地図エリア（ピン付き） */
.map-container {
  flex: 0 0 45%; 
  width: 100%;
  border-bottom: 1px solid var(--border);
  position: relative;
  background: #111;
}
/* 地図をNOCTEXカラーに馴染ませるフィルタ */
.map-container iframe {
  width: 100%;
  height: 100%;
  filter: grayscale(1) invert(0.9) contrast(1.2) brightness(0.8);
  border: 0;
}

/* リストエリア */
.list-section {
  flex: 1;
  overflow-y: auto;
  background: var(--black);
}
.search-container { padding: 15px 20px; position: sticky; top: 0; background: var(--black); z-index: 50; }
.search-input { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 12px; color: var(--white); font-family: 'DM Mono'; font-size: 13px; outline: none; }

.rank-item { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; }
.rank-num { font-family: 'Bebas Neue'; font-size: 22px; color: var(--gold); width: 45px; }
.rank-name { font-family: 'Bebas Neue'; font-size: 20px; flex: 1; letter-spacing: 1px; }
.rank-score { font-family: 'Bebas Neue'; font-size: 20px; color: var(--gold); }
</style>
</head>
<body>

<div class="header">
  <div class="top-row">
    <a href="index.html" class="logo">NOCTEX</a>
    <a href="mypage.html" class="my-link">MY PAGE</a>
  </div>
</div>

<div class="map-container">
  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3241.747796443314!2d139.6932473767448!3d35.65858047259463!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188b57cf686611%3A0x64405c1d6835212!2sWOMB!5e0!3m2!1sja!2sjp!4v1709999999999!5m2!1sja!2sjp" 
    allowfullscreen="" loading="lazy">
  </iframe>
</div>

<div class="list-section">
  <div class="search-container">
    <input type="text" class="search-input" placeholder="SEARCH VENUE...">
  </div>

  <div id="ranking-list">
    <a href="womb.html" class="rank-item">
      <div class="rank-num">01</div>
      <div class="venue-info" style="flex:1;">
        <div class="rank-name">WOMB</div>
        <div style="font-family:'DM Mono'; font-size:9px; color:#444;">SHIBUYA / MARUYAMACHO</div>
      </div>
      <div class="rank-score">92</div>
    </a>

    <div class="rank-item">
      <div class="rank-num">02</div>
      <div class="venue-info" style="flex:1;">
        <div class="rank-name">ZEROTOKYO</div>
        <div style="font-family:'DM Mono'; font-size:9px; color:#444;">SHINJUKU / KABUKICHO</div>
      </div>
      <div class="rank-score">89</div>
    </div>
    
    <div class="rank-item"><div class="rank-num">03</div><div class="rank-name">VENT</div><div class="rank-score">87</div></div>
  </div>
</div>

</body>
</html>
