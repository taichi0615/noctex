<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTEX | TOKYO 99</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --black: #060608; --border: #1c1c24; --gold: #c8a84a; --white: #ede9e0; --card: #0e0e12; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--black); color: var(--white); font-family: sans-serif; max-width: 430px; margin: 0 auto; }

/* ヘッダーと検索窓 */
.header { padding: 30px 20px; border-bottom: 1px solid var(--border); }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
.logo { font-family: 'Bebas Neue'; font-size: 28px; color: var(--gold); }
.my-link { font-family: 'DM Mono'; font-size: 11px; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 5px 12px; }

.search-container { position: relative; }
.search-input { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 15px; color: var(--white); font-family: 'DM Mono'; font-size: 14px; outline: none; }
.search-input:focus { border-color: var(--gold); }

/* ランキングリスト */
.rank-item { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; cursor: pointer; }
.rank-item:active { background: #111; }
.rank-num { font-family: 'Bebas Neue'; font-size: 24px; color: #444; width: 40px; }
.rank-name { font-family: 'Bebas Neue'; font-size: 22px; flex: 1; letter-spacing: 1px; }
.rank-score { font-family: 'Bebas Neue'; font-size: 22px; color: var(--gold); }
</style>
</head>
<body>

<div class="header">
  <div class="top-row">
    <div class="logo">NOCTEX</div>
    <a href="mypage.html" class="my-link">MY PAGE</a>
  </div>
  <div class="search-container">
    <input type="text" class="search-input" placeholder="SEARCH VENUE OR GENRE...">
  </div>
</div>

<div id="ranking-list">
  <a href="womb.html" class="rank-item">
    <div class="rank-num">01</div>
    <div class="rank-name">WOMB</div>
    <div class="rank-score">92</div>
  </a>

  <div class="rank-item">
    <div class="rank-num">02</div>
    <div class="rank-name">ZEROTOKYO</div>
    <div class="rank-score">89</div>
  </div>
</div>

<script>
  // 検索窓の簡易フィルター（デモ用）
  document.querySelector('.search-input').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.rank-item');
    items.forEach(item => {
      const name = item.querySelector('.rank-name').innerText.toLowerCase();
      item.style.display = name.includes(term) ? 'flex' : 'none';
    });
  });
</script>

</body>
</html>
