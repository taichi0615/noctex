<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOCTEX | TOKYO 99</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #060608;
  --deep: #0a0a0e;
  --card: #0e0e12;
  --border: #1c1c24;
  --gold: #c8a84a;
  --white: #ede9e0;
  --muted: #52525e;
  --muted2: #84849a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background: var(--black); color: var(--white); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; max-width: 430px; margin: 0 auto; }

/* ── UI ── */
.top-nav { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; z-index:1000; background:rgba(6,6,8,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding: 15px 20px; display:flex; justify-content:space-between; align-items:center; }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:4px; color:var(--gold); text-decoration:none; }

.main { padding-top: 70px; padding-bottom: 100px; }

/* ── 都市ヘッダー ── */
.city-hero { padding: 30px 20px; border-bottom: 1px solid var(--border); }
.city-label { font-family:'DM Mono'; font-size:12px; color:var(--gold); letter-spacing:3px; }
.city-name { font-family:'Bebas Neue'; font-size:48px; line-height:1; margin: 5px 0; }
.city-stats { font-size:11px; color:var(--muted2); display:flex; gap:15px; }

/* ── 99 RANKING LIST ── */
.rank-item { 
  display:flex; align-items:center; padding:20px; 
  border-bottom:1px solid var(--border); 
  cursor:pointer; position:relative; z-index:1;
}
/* タップした時の反応を強化 */
.rank-item:active { background: rgba(200,168,74,0.1); }

.rank-num { font-family:'Bebas Neue'; font-size:28px; color:var(--muted); width:45px; pointer-events:none; }
.rank-item:nth-child(-n+3) .rank-num { color: var(--gold); }
.rank-info { flex:1; pointer-events:none; }
.rank-name { font-family:'Bebas Neue'; font-size:22px; letter-spacing:1px; line-height:1.2; }
.rank-tag { font-size:10px; color:var(--muted2); margin-top:4px; display:flex; gap:8px; }
.rank-score-mini { text-align:right; font-family:'Bebas Neue'; font-size:26px; width:50px; pointer-events:none; }

/* ── 個店詳細モーダル ── */
#venue-modal {
  position: fixed; inset: 0; background: var(--black); z-index: 2000;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#venue-modal.open { transform: translateY(0); }
.modal-close { 
  position: fixed; top: 20px; right: 20px; width: 44px; height: 44px; 
  background: rgba(0,0,0,0.6); border: 1px solid var(--border);
  backdrop-filter: blur(10px); border-radius: 50%; 
  display: flex; align-items: center; justify-content: center; z-index: 2100; font-size: 20px;
}

.venue-header { height: 280px; background-size: cover; background-position: center; position: relative; }
.venue-header::after { content:''; position:absolute; inset:0; background: linear-gradient(to bottom, transparent, var(--black)); }
.venue-body { padding: 25px; }

.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; }
.score-item { background: var(--card); padding: 18px; border: 1px solid var(--border); border-radius: 2px; }
.score-label { font-size: 10px; color: var(--muted2); font-family: 'DM Mono'; }
.score-val { font-family: 'Bebas Neue'; font-size: 28px; color: var(--gold); margin-top:5px; }

.venue-desc { font-size: 14px; line-height: 1.9; color: var(--muted2); margin-bottom: 35px; text-align: justify; }
.cta-btn { display: block; width: 100%; background: var(--gold); color: #000; text-align: center; padding: 18px; font-family: 'DM Mono'; font-weight: bold; text-decoration: none; letter-spacing:2px; }

/* フッター */
.footer { padding: 60px 20px 40px; border-top: 1px solid var(--border); text-align: center; }
.footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
.footer-links a { font-size: 11px; color: var(--muted2); text-decoration: none; }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="#" class="nav-logo">NOCTEX</a>
  <div style="font-family:'DM Mono'; font-size:10px; color:var(--gold)">99 LIST / TOKYO</div>
</nav>

<main class="main">
  <section class="city-hero">
    <div class="city-label">GLOBAL RANKING</div>
    <h1 class="city-name">TOKYO 99</h1>
    <div class="city-stats">
      <span>RANKED BY NOCTEX EDITORIAL</span>
    </div>
  </section>

  <div class="ranking-container" id="ranking-list">
    </div>

  <footer class="footer">
    <div class="nav-logo" style="font-size:18px; opacity:0.5;">NOCTEX</div>
    <div class="footer-links">
      <a href="#">ABOUT</a>
      <a href="#">FAQ</a>
      <a href="#">CONTACT</a>
      <a href="#">PRIVACY</a>
      <a href="#">TERMS</a>
    </div>
    <p style="font-size:9px; color:var(--muted); margin-top:30px;">© 2026 NOCTEX INDEPENDENT. RANKING LIMITED TO TOP 99.</p>
  </footer>
</main>

<div id="venue-modal">
  <div class="modal-close" onclick="closeModal()">✕</div>
  <div id="modal-content"></div>
</div>

<script>
const tokyoData = [
  { rank: "01", name: "WOMB", area: "SHIBUYA", genre: "TECHNO", score: 92, img: "https://images.unsplash.com/photo-1598387181032-a778568e088f?q=80&w=800", desc: "世界基準の音響システムと、アジア最大級のミラーボールを擁する東京テクノシーンの象徴。3フロア構成で、メインフロアの圧倒的な没入感は唯一無二。", scores: { sound: 98, crowd: 85, price: 70, vibe: 95 } },
  { rank: "02", name: "ZEROTOKYO", area: "SHINJUKU", genre: "ALL GENRE", score: 89, img: "https://images.unsplash.com/photo-1571266028243-3716f02d2d2e?q=80&w=800", desc: "歌舞伎町タワー内に誕生した巨大エンターテインメント空間。最新の照明技術と圧倒的なキャパシティで、国内外のトップアーティストを招聘。", scores: { sound: 90, crowd: 92, price: 65, vibe: 88 } },
  { rank: "03", name: "VENT", area: "OMOTESANDO", genre: "HOUSE / TECHNO", score: 87, img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=800", desc: "「音」を追求する大人のための隠れ家。BOSEのカスタムスピーカーから放たれる純粋な音響体験は、耳の肥えたオーディエンスを魅了し続ける。", scores: { sound: 99, crowd: 80, price: 75, vibe: 92 } }
];

// 4-99位の自動生成
for(let i=4; i<=99; i++){
  tokyoData.push({
    rank: i.toString().padStart(2, '0'),
    name: `VENUE NAME ${i}`,
    area: i % 2 === 0 ? "ROPPONGI" : "SHIBUYA",
    genre: "HOUSE / MIX",
    score: 85 - Math.floor(i/3),
    img: "https://images.unsplash.com/photo-1514525253344-f81df034226d?q=80&w=800",
    desc: "NOCTEX独自の審査基準により選出。詳細なレビューと最新のイベントスケジュールは現在アップデート中です。",
    scores: { sound: 75, crowd: 70, price: 60, vibe: 75 }
  });
}

const listContainer = document.getElementById('ranking-list');

// リスト表示
tokyoData.forEach(item => {
  const div = document.createElement('div');
  div.className = 'rank-item';
  // 確実にクリックを拾うためにinnerHTMLにonclickを仕込むのではなく、親要素全体にイベントを付与
  div.innerHTML = `
    <div class="rank-num">${item.rank}</div>
    <div class="rank-info">
      <div class="rank-name">${item.name}</div>
      <div class="rank-tag"><span>${item.area}</span><span>${item.genre}</span></div>
    </div>
    <div class="rank-score-mini">${item.score}</div>
  `;
  div.addEventListener('click', (e) => {
    e.preventDefault();
    openModal(item);
  });
  listContainer.appendChild(div);
});

function openModal(item) {
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="venue-header" style="background-image: url('${item.img}')"></div>
    <div class="venue-body">
      <div class="city-label">${item.area} / ${item.genre}</div>
      <h2 class="city-name">${item.name}</h2>
      
      <div class="score-grid">
        <div class="score-item"><div class="score-label">Sound System</div><div class="score-val">${item.scores.sound}</div></div>
        <div class="score-item"><div class="score-label">Audience</div><div class="score-val">${item.scores.crowd}</div></div>
        <div class="score-item"><div class="score-label">Pricing</div><div class="score-val">${item.scores.price}</div></div>
        <div class="score-item"><div class="score-label">Vibe Score</div><div class="score-val">${item.scores.vibe}</div></div>
      </div>

      <p class="venue-desc">${item.desc}</p>
      
      <a href="https://www.google.com/maps/search/${item.name}" target="_blank" class="cta-btn">GOOGLE MAPS</a>
    </div>
  `;
  document.getElementById('venue-modal').classList.add('open');
  document.body.style.overflow = 'hidden'; // 背景スクロール防止
}

function closeModal() {
  document.getElementById('venue-modal').classList.remove('open');
  document.body.style.overflow = '';
}
</script>

</body>
</html>
