<style>
/* 待機中のコア（核）のアニメーション */
.ignition-core {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 2px solid var(--neon-blue);
  box-shadow: 0 0 20px var(--neon-blue);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pulse 2s infinite ease-in-out; /* 人数が増えるほどこの速度を速くする */
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 10px var(--neon-blue); }
  50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px var(--neon-blue); }
  100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 10px var(--neon-blue); }
}

/* 解放された時のフラッシュ */
.flash-effect {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: white;
  z-index: 100;
  animation: flash-out 0.5s forwards;
}

@keyframes flash-out {
  from { opacity: 1; }
  to { opacity: 0; pointer-events: none; }
}
</style>
